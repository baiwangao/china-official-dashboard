<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="api-auth-token" content=""/>
<title>中纪委审查调查 · 市场监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e11; --surface:#14181d; --card:#1a1f26; --card-hover:#1e242e;
  --border:rgba(255,255,255,0.06); --border-active:rgba(255,255,255,0.12);
  --text0:#f0f2f5; --text1:#8895a7; --text2:#505a6b;
  --red:#ff4757; --green:#2ed573; --amber:#ffa502; --blue:#70a1ff;
  --red-bg:rgba(255,71,87,0.1); --green-bg:rgba(46,213,115,0.08);
  --amber-bg:rgba(255,165,2,0.08); --blue-bg:rgba(112,161,255,0.08);
  --radius:10px; --radius-sm:6px; --font:'-apple-system','BlinkMacSystemFont','Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text0);font-family:var(--font);font-size:13px;-webkit-font-smoothing:antialiased;}
.shell{display:grid;grid-template-rows:52px 1fr;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}

header{grid-column:1/-1;display:flex;align-items:center;padding:0 20px;background:rgba(20,24,29,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);gap:16px;z-index:10}
.logo{font-size:15px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap}
.logo span{background:linear-gradient(135deg,var(--red),#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text1);padding:4px 10px;background:var(--card);border-radius:20px}
.header-stat b{color:var(--text0);font-weight:600}
.header-spacer{flex:1}
.nav-links{display:flex;gap:4px}
.nav-links a{color:var(--text2);text-decoration:none;font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);transition:all .2s}
.nav-links a:hover{color:var(--text0);background:var(--card)}

aside{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;gap:1px}
.panel{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.panel-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.year-row{display:flex;gap:6px;flex-wrap:wrap}
.year-pill{background:var(--card);border:1px solid var(--border);color:var(--text1);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s}
.year-pill:hover{border-color:var(--border-active);color:var(--text0)}
.year-pill.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}

.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.stat-item .n{font-size:22px;font-weight:700;line-height:1.2}
.stat-item .l{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:.02em}
.stat-item.red .n{color:var(--red)}
.stat-item.green .n{color:var(--green)}
.stat-item.amber .n{color:var(--amber)}

.bar-list{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-type{font-size:11px;color:var(--text1);width:52px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--card);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-val{font-size:10px;color:var(--text2);width:26px;text-align:left}

main{display:grid;grid-template-rows:44px 1fr auto;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.mode-group{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:2px}
.mode-btn{padding:5px 12px;border:none;background:transparent;color:var(--text1);font-family:var(--font);font-size:11px;font-weight:500;border-radius:4px;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--card-hover);color:var(--text0)}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 4px}

.chart-wrap{position:relative;overflow:hidden}
#main-chart{width:100%;height:100%}

.detail{background:var(--surface);border-top:1px solid var(--border);padding:14px 20px;min-height:72px;max-height:180px;overflow-y:auto;transition:opacity .2s}
.detail.empty{opacity:.4}
.detail-header{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
.detail-month{font-size:20px;font-weight:700;color:var(--text0);line-height:1}
.detail-change{font-size:13px;font-weight:600}
.detail-stats{font-size:11px;color:var(--text2);margin-bottom:8px}
.detail-events{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;transition:all .15s}
.event-card:hover{border-color:var(--border-active)}
.event-card.high{border-left:2px solid var(--red)}
.event-card.mid{border-left:2px solid var(--amber)}
.event-title{font-size:12px;font-weight:600;color:var(--text0);margin-bottom:4px;line-height:1.35}
.event-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.event-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.event-type.反腐通报{background:var(--red-bg);color:var(--red)}
.event-type.重大事故{background:var(--amber-bg);color:var(--amber)}
.event-type.人事动向{background:var(--blue-bg);color:var(--blue)}
.event-type.外事活动{background:var(--green-bg);color:var(--green)}
.event-impact{font-size:10px;color:var(--text2)}
.event-summary{font-size:10px;color:var(--text1);margin-top:4px;line-height:1.4}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:2px}

@media(max-width:768px){
  .shell{grid-template-columns:1fr;grid-template-rows:48px auto 1fr}
  aside{flex-direction:row;overflow-x:auto;max-height:120px;border-right:none;border-bottom:1px solid var(--border);gap:0}
  .panel{border-bottom:none;border-right:1px solid var(--border);min-width:140px;flex-shrink:0}
  .panel:last-child{border-right:none}
  .stat-row{grid-template-columns:repeat(3,1fr);gap:4px}
  .stat-item{padding:8px 6px}
  .stat-item .n{font-size:16px}
  .year-row{flex-wrap:nowrap;overflow-x:auto}
  .year-pill{flex-shrink:0;font-size:11px;padding:4px 10px}
  .detail-events{grid-template-columns:1fr}
  .detail-header{flex-direction:column;gap:4px}
}
@media(max-width:480px){
  header{padding:0 12px}
  .logo{font-size:13px}
  .header-stat{font-size:10px;padding:3px 8px}
  aside{max-height:100px}
  .panel{padding:8px 10px;min-width:120px}
  .panel-label{font-size:9px;margin-bottom:6px}
  .stat-row{grid-template-columns:repeat(3,1fr)}
  .stat-item .n{font-size:14px}
  .stat-item .l{font-size:9px}
  .mode-btn{padding:4px 8px;font-size:10px}
  .detail{padding:8px 12px}
  .detail-month{font-size:16px}
  .event-card{padding:8px}
  .event-title{font-size:11px}
}
</style>
</head>
<body>
<div class="shell">
<header>
  <div class="logo"><span>CCDI</span> Market Monitor</div>
  <div class="header-stat"><b id="h-total">—</b> events</div>
  <div class="header-stat" style="color:var(--green)"><b id="h-month">—</b> this month</div>
  <div class="header-spacer"></div>
  <nav class="nav-links"><a href="/">← 返回主页</a></nav>
</header>

<aside>
  <div class="panel"><div class="panel-label">Year</div><div class="year-row" id="year-row"></div></div>
  <div class="panel">
    <div class="panel-label">Stats</div>
    <div class="stat-row">
      <div class="stat-item red"><div class="n" id="s-total">—</div><div class="l">事件总数</div></div>
      <div class="stat-item amber"><div class="n" id="s-peak">—</div><div class="l">峰值月份</div></div>
      <div class="stat-item"><div class="n" id="s-top">—</div><div class="l">最严重类型</div></div>
    </div>
  </div>
  <div class="panel" style="flex:1"><div class="panel-label">事件类型</div><div class="bar-list" id="type-bars"></div></div>
</aside>

<main>
  <div class="toolbar">
    <div class="mode-group">
      <button class="mode-btn active" data-mode="kline" onclick="setMode(this)">K 线</button>
      <button class="mode-btn" data-mode="bar" onclick="setMode(this)">柱状图</button>
      <button class="mode-btn" data-mode="line" onclick="setMode(this)">趋势线</button>
    </div>
    <div class="tb-sep"></div>
    <span style="font-size:11px;color:var(--text2)">点击蜡烛查看事件详情</span>
    <div class="tb-sep"></div>
    <span style="font-size:10px;color:var(--text2)" id="refresh-hint">每30秒自动更新</span>
    <div class="tb-sep"></div>
    <button class="mode-btn" onclick="refresh()" style="font-size:11px">↻ 立即刷新</button>
  </div>
  <div class="chart-wrap"><div id="main-chart"></div></div>
  <div class="detail empty" id="detail">
    <div style="color:var(--text2);font-size:12px">点击上方图表月份查看该月事件详情</div>
  </div>
</main>
</div>

<script>
var state={year:2026,mode:'kline',klineData:[],sentimentData:[]};
var chart,API_TOKEN=document.querySelector('meta[name="api-auth-token"]')?.content||'';
function af(url,opts){opts=opts||{};if(API_TOKEN){opts.headers=opts.headers||{};opts.headers['x-api-key']=API_TOKEN}return fetch(url,opts).then(function(r){if(!r.ok)throw Error(r.status);return r.json()})}

function init(){
  chart=echarts.init(document.getElementById('main-chart'),null,{renderer:'canvas'});
  window.addEventListener('resize',function(){chart.resize()});
  loadYears();loadStats();loadKline();
  setInterval(function(){loadStats();loadKline()},120000)
}
function refresh(){loadStats();loadKline();var h=document.getElementById('refresh-hint');h.textContent='刷新完成';setTimeout(function(){h.textContent='每30秒自动更新'},1500)}

function loadYears(){
  af('/api/kline/years').then(function(data){
    var years=data.map(function(r){return r.year});
    if(years.length&&years.indexOf(state.year)===-1)state.year=years[0];
    document.getElementById('year-row').innerHTML=years.map(function(y){return'<button class="year-pill'+(y===state.year?' active':'')+'" onclick="selectYear('+y+')">'+y+'年</button>'}).join('')||'<button class="year-pill active">—</button>'
  }).catch(function(){})
}

function loadStats(){
  af('/api/kline/stats').then(function(s){
    document.getElementById('s-total').textContent=s.total;
    document.getElementById('s-peak').textContent=s.peakMonth;
    document.getElementById('s-top').textContent=s.topGrade;
    document.getElementById('h-total').textContent=s.total;
    var maxCnt=Math.max.apply(null,(s.byGrade||[]).map(function(r){return Number(r.cnt)}));
    var colors={反腐通报:'#ff4757',重大事故:'#ffa502',人事动向:'#70a1ff',外事活动:'#2ed573',传闻轶事:'#a55eea',政治作秀:'#ff6b81',经济动向:'#ffa502',澄清传闻:'#2ed573'};
    document.getElementById('type-bars').innerHTML=(s.byGrade||[]).map(function(r,i){var c=colors[r.grade]||'#8895a7';return'<div class="bar-row"><div class="bar-type" style="color:'+c+'">'+r.grade+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(Number(r.cnt)/maxCnt*100)+'%;background:'+c+'"></div></div><div class="bar-val">'+r.cnt+'</div></div>'}).join('')
  }).catch(function(){})
}

function loadKline(){
  af('/api/kline/'+state.year).then(function(res){state.klineData=res.data||[];return af('/api/kline/sentiment/'+state.year).catch(function(){return{data:[]}})}).then(function(s){state.sentimentData=s.data||[];updateHeaderMonth();renderChart()}).catch(function(e){})
}
function updateHeaderMonth(){
  var now=new Date(),nowM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var cur=(state.klineData||[]).filter(function(d){return d.month===nowM}).reduce(function(a,d){return a+d.count},0);
  document.getElementById('h-month').textContent=cur||0
}

function renderChart(){
  var data=state.klineData;if(!data.length)return;
  var labels=data.map(function(d){return d.month.slice(5)+'月'});
  function ma(n,arr){var r=[];for(var i=0;i<arr.length;i++){if(i<n-1){r.push('-');continue}var s=0;for(var j=0;j<n;j++)s+=arr[i-j].close;r.push((s/n).toFixed(2))}return r}
  var series=[],isK=state.mode==='kline';
  if(isK){
    series.push({name:'K',type:'candlestick',data:data.map(function(d){return[d.open,d.close,d.low,d.high]}),itemStyle:{color:'none',color0:'none',borderColor:'#ff4757',borderColor0:'#2ed573',borderWidth:1.5},emphasis:{itemStyle:{borderWidth:2.5}}});
    series.push({name:'MA5',type:'line',data:ma(3,data),smooth:!0,lineStyle:{opacity:.5,width:1,color:'#ffa502'},symbol:'none'});
    if(data.length>=5)series.push({name:'MA10',type:'line',data:ma(5,data),smooth:!0,lineStyle:{opacity:.5,width:1,color:'#70a1ff'},symbol:'none'});
    var sm={};state.sentimentData.forEach(function(s){sm[s.month]=s});
    series.push({name:'情绪',type:'bar',xAxisIndex:1,yAxisIndex:1,data:data.map(function(d){var s=sm[d.month]||{yes:0,no:0},n=s.yes-s.no;return{value:Math.abs(n||0),itemStyle:{color:n>=0?'rgba(255,71,87,0.55)':'rgba(46,213,115,0.45)'}}})});
  }else if(state.mode==='bar'){
    series.push({name:'事件数',type:'bar',data:data.map(function(d){return{value:d.count,itemStyle:{color:d.close>=d.open?'#ff4757':'#2ed573'}}}),barWidth:'60%',label:{show:!0,position:'top',color:'#8895a7',fontSize:10,formatter:'{c}'}})
  }else{
    series.push({name:'严重度',type:'line',data:data.map(function(d){return d.close}),lineStyle:{color:'#ff4757',width:2},itemStyle:{color:'#ff4757'},areaStyle:{color:'rgba(255,71,87,0.06)'},symbol:'circle',symbolSize:3,smooth:.3});
    series.push({name:'MA3',type:'line',data:ma(3,data),smooth:!0,lineStyle:{opacity:.5,width:1,color:'#ffa502'},symbol:'none'})
  }
  var gOpt=isK?{grid:[{left:55,right:20,top:8,bottom:80},{left:55,right:20,top:'78%',bottom:20}],xAxis:[{type:'category',data:labels,gridIndex:0,axisLine:{lineStyle:{color:'rgba(255,255,255,0.06)'}},axisLabel:{color:'#505a6b',fontSize:10},axisTick:{show:0},splitLine:{show:0}},{type:'category',data:labels,gridIndex:1,axisLine:{show:0},axisLabel:{show:0},axisTick:{show:0},splitLine:{show:0}}],yAxis:[{gridIndex:0,scale:!0,splitLine:{lineStyle:{color:'#1a1f26'}},axisLabel:{color:'#505a6b',fontSize:9},min:function(v){return v.min-5}},{gridIndex:1,scale:!0,splitLine:{show:0},axisLabel:{show:0}}],dataZoom:[{type:'inside',xAxisIndex:[0,1],start:0,end:100},{type:'slider',xAxisIndex:[0,1],start:0,end:100,bottom:22,height:14,borderColor:'rgba(255,255,255,0.06)',backgroundColor:'transparent',fillerColor:'rgba(255,71,87,0.06)',handleStyle:{color:'#505a6b'},textStyle:{color:'#505a6b',fontSize:9},showDetail:0}]}:{grid:[{left:50,right:20,top:8,bottom:28}],xAxis:[{type:'category',data:labels,axisLine:{lineStyle:{color:'rgba(255,255,255,0.06)'}},axisLabel:{color:'#505a6b',fontSize:10},axisTick:{show:0}}],yAxis:[{scale:!0,splitLine:{lineStyle:{color:'#1a1f26'}},axisLabel:{color:'#505a6b',fontSize:9}}],dataZoom:[{type:'inside',start:0,end:100}]};
  chart.setOption({backgroundColor:'transparent',animation:!0,animationDuration:400,...gOpt,series:series},!0);
  chart.off('click');chart.on('click',function(p){var d=data[p.dataIndex];if(!d||!d.count)return;showDetail(d)})
}

function showDetail(d){
  var panel=document.getElementById('detail');panel.classList.remove('empty');
  var ch=d.open?((d.close-d.open)/d.open*100):0,cc=ch>=0?'#ff4757':'#2ed573',cs=ch>=0?'+':'';
  var types={反腐通报:'#ff4757',重大事故:'#ffa502',人事动向:'#70a1ff',外事活动:'#2ed573',传闻轶事:'#a55eea'};
  panel.innerHTML='<div class="detail-header"><div class="detail-month">'+d.month+'</div><div class="detail-change" style="color:'+cc+'">'+cs+ch.toFixed(1)+'%</div></div><div class="detail-stats">严重度 <b style="color:var(--text0)">'+d.severity+'</b> · 事件 <b style="color:var(--text0)">'+d.count+'</b> 条 · 反腐 '+d.anti_corruption+' · 事故 '+d.major_accident+' · 人事 '+d.personnel_move+'</div><div class="detail-events">'+d.events.map(function(e){var tc=types[e.type]||'#8895a7',ic=e.impact==='高'?'high':e.impact==='中'?'mid':'';return'<div class="event-card '+ic+'"><div class="event-title">'+e.title+'</div><div class="event-meta"><span class="event-type '+e.type+'">'+e.type+'</span>'+(e.impact?'<span class="event-impact">'+e.impact+'影响</span>':'')+'</div>'+(e.summary?'<div class="event-summary">'+e.summary.slice(0,80)+(e.summary.length>80?'…':'')+'</div>':'')+'</div>'}).join('')||'<div style="color:var(--text2);font-size:12px">暂无事件记录</div>'+'</div>'
}

function selectYear(y){state.year=y;document.querySelectorAll('.year-pill').forEach(function(b){b.classList.toggle('active',parseInt(b.textContent)===y)});loadKline()}
function setMode(b){state.mode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(function(c){c.classList.toggle('active',c.dataset.mode===state.mode)});renderChart()}

init();
</script>
</body>
</html>
